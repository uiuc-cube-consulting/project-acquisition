# People Data Labs (PDL) search profiles. Each profile is translated into a PDL
# Person Search Elasticsearch query by src/sourcing/pdl.py (build_query).
#
# Supported keys:
#   uiuc_only:         true  -> filter to UIUC (Urbana-Champaign) alumni
#   job_title_levels:  PDL seniority levels: cxo, owner, partner, vp, director,
#                      manager, senior, entry
#   location_regions:  PDL location_region values (e.g. "illinois")
#   industries:        PDL job_company_industry values (LinkedIn-style)
#
# Every query also requires a work email (build_query adds exists:work_email),
# since records without one can't be used for outreach.
#
# Docs: https://docs.peopledatalabs.com/docs/person-search-api

profiles:
  - name: uiuc_alumni_executives
    description: "UIUC alumni in decision-maker roles — primary daily source"
    uiuc_only: true
    job_title_levels:
      - "cxo"
      - "owner"
      - "partner"
      - "vp"
      - "director"

  - name: illinois_executives
    description: "Decision-makers at Illinois companies (breadth)"
    location_regions:
      - "illinois"
    job_title_levels:
      - "cxo"
      - "owner"
      - "partner"
      - "vp"
      - "director"

  - name: tech_founders
    description: "Founders/execs in software & tech (breadth)"
    industries:
      - "computer software"
      - "information technology and services"
      - "internet"
    job_title_levels:
      - "cxo"
      - "owner"
      - "partner"

  - name: cube_alumni
    description: "Loaded from the CUBE Alumni Sheet, not PDL"
    source: cube_alumni_sheet
