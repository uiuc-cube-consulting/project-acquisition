# Apollo People Search profiles. Each profile's `params` are passed straight to
# Apollo's /v1/mixed_people/search endpoint. The orchestrator runs the UIUC
# profile EVERY day (primary source) and rotates one breadth profile per day.
#
# Docs: https://docs.apollo.io/reference/people-search

profiles:
  - name: uiuc_alumni_executives
    description: "UIUC alumni in decision-maker roles — primary, searched every day"
    uiuc_only: true   # filtered to UIUC alumni, so every result is is_uiuc_alum=True
    enrich: true
    params:
      person_titles:
        - "Founder"
        - "Co-Founder"
        - "CEO"
        - "CTO"
        - "COO"
        - "President"
        - "VP"
        - "Vice President"
        - "Director"
        - "Head of"
        - "Managing Partner"
        - "Partner"
      person_schools:
        - "University of Illinois Urbana-Champaign"
        - "University of Illinois at Urbana-Champaign"
        - "University of Illinois, Urbana-Champaign"
        - "University of Illinois Urbana Champaign"
      page: 1
      per_page: 50

  - name: vc_partners
    description: "Partner-level contacts at top VCs (breadth)"
    enrich: true
    params:
      person_titles:
        - "Managing Partner"
        - "General Partner"
        - "Partner"
        - "Principal"
      q_organization_domains:
        - "originventures.com"
        - "hydeparkangels.com"
        - "sequoiacap.com"
        - "a16z.com"
        - "khoslaventures.com"
        - "ycombinator.com"
      page: 1
      per_page: 25

  - name: yc_founders
    description: "Recent YC batch founders (breadth)"
    enrich: true
    params:
      person_titles:
        - "Founder"
        - "Co-Founder"
        - "CEO"
      organization_keyword_tags:
        - "Y Combinator"
      page: 1
      per_page: 25

  - name: illinois_startups
    description: "Founder/exec at Illinois-based startups (breadth)"
    enrich: true
    params:
      person_titles:
        - "Founder"
        - "CEO"
        - "CTO"
      person_locations:
        - "Illinois, US"
        - "Chicago, IL"
        - "Champaign, IL"
      organization_num_employees_ranges:
        - "1,200"
      page: 1
      per_page: 25

  - name: cube_alumni
    description: "Loaded from the CUBE Alumni Sheet, not Apollo"
    source: cube_alumni_sheet
