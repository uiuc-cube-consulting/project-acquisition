# Apollo People Search (api_search) profiles. Each profile's `params` are sent as
# query parameters to /api/v1/mixed_people/api_search (list values get a []
# suffix automatically). The orchestrator rotates one profile per day.
#
# IMPORTANT: api_search has NO school/alma-mater filter (it was removed when
# Apollo deprecated the old mixed_people/search endpoint), so we cannot target
# UIUC *alumni* at the API level — q_keywords matches the employer, returning
# UIUC staff, not alumni. We therefore discover decision-makers by title +
# Illinois location for volume; real UIUC alumni come from the CUBE alumni Sheet
# (accurate) and still rank first via the alumni-first selection.
# Docs: https://docs.apollo.io/reference/people-api-search

profiles:
  - name: illinois_executives
    description: "Decision-makers at Illinois companies"
    enrich: true
    params:
      person_titles:
        - "Founder"
        - "Co-Founder"
        - "CEO"
        - "CTO"
        - "COO"
        - "President"
        - "VP"
        - "Vice President"
        - "Director"
        - "Head of"
        - "Owner"
        - "Partner"
      person_locations:
        - "Illinois, US"
        - "Chicago, Illinois, US"
        - "Champaign, Illinois, US"
      per_page: 50

  - name: tech_founders
    description: "Founders/execs in software & tech (breadth)"
    enrich: true
    params:
      q_keywords: "software"
      person_titles:
        - "Founder"
        - "Co-Founder"
        - "CEO"
        - "CTO"
      per_page: 25

  - name: cube_alumni
    description: "Loaded from the CUBE Alumni Sheet, not Apollo"
    source: cube_alumni_sheet
